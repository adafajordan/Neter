<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Neter</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="site-header" aria-label="Primary">
        <button class="icon-button" type="button" aria-label="Upload media">
          <span aria-hidden="true">+</span>
        </button>

        <div class="brand-mark">
          <img
            id="site-logo"
            src="https://github.com/user-attachments/assets/464530e6-0cb9-432e-9ce0-6fdf0152b1be"
            data-fallback-src="/icons/site-logo.svg"
            alt="Neter logo"
          />
        </div>

        <button class="icon-button" type="button" aria-label="Search">
          <span aria-hidden="true">⌕</span>
        </button>
      </header>

      <div class="headline-bar" aria-label="News header">
        <strong>News</strong>
        <span>Headlines, trends, and updates</span>
      </div>

      <aside class="ad-slot ad-slot--banner" aria-label="Advertisement space">
        Advertisement space
      </aside>

      <section aria-labelledby="news-title">
        <div class="section-header">
          <h2 id="news-title">Top stories</h2>
          <span>Live sources</span>
        </div>
        <div id="news-list" class="news-grid"></div>
      </section>

      <aside class="ad-slot" aria-label="Advertisement space">Ad space</aside>

      <section aria-labelledby="social-title">
        <div class="section-header">
          <h2 id="social-title">Social feed</h2>
          <span>Latest posts</span>
        </div>
        <div id="social-list" class="social-feed"></div>
      </section>

      <aside class="ad-slot ad-slot--banner" aria-label="Advertisement space">
        Advertisement space
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
